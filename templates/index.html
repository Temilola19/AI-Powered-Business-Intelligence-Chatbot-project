<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Olist BI Dashboard</title>

<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  background:#0f1117;
  color:#e0e0e0;
}

/* HEADER */
header {
  background:#1a1d27;
  padding:18px 30px;
  border-bottom:1px solid #2e3250;
  display:flex;
  align-items:center;
  gap:12px;
}
header h1 { font-size:1.2rem; }
header span {
  background:#2563eb;
  padding:4px 10px;
  border-radius:20px;
  font-size:0.75rem;
}

/* KPIs */
.kpis {
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:16px;
  padding:20px 30px;
  background:#1a1d27;
}
.kpi {
  background:#0f1117;
  border:1px solid #2e3250;
  border-radius:10px;
  padding:14px;

}
.kpi label {
  font-size:0.7rem;
  color:#7a8099;
  margin-right: 6px;
}
.kpi span {
  font-size:1.4rem;
  font-weight:700;
}

/* MAIN */
.main {
  display:grid;
  grid-template-columns: 1fr 360px;
  height: calc(100vh - 140px);
}

/* CHARTS */
.charts {
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  overflow:auto;
}
.card {
  background:#1a1d27;
  border:1px solid #2e3250;
  border-radius:12px;
  padding:16px;
}
.card h3 {
  font-size:0.75rem;
  color:#7a8099;
  margin-bottom:10px;
}
.wide { grid-column: span 2; }

/* CHAT */
.chat {
  border-left:1px solid #2e3250;
  display:flex;
  flex-direction:column;
}

/* CHAT HEADER */
.chat-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid #2e3250;
}
.chat-header button {
  background:none;
  border:1px solid #2e3250;
  color:#aaa;
  padding:4px 10px;
  border-radius:6px;
  cursor:pointer;
}
.chat-header button:hover {
  border-color:#2563eb;
  color:white;
}

.chat-box {
  flex:1;
  overflow:auto;
  padding:16px;
}

/* MESSAGES */
.msg {
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  font-size:0.85rem;
}
.user {
  background:#2563eb;
  text-align:right;
}
.bot {
  background:#0f1117;
  border:1px solid #2e3250;
}

/* SUGGESTIONS */
.suggestions {
  padding:10px;
}
.suggestions button {
  width:100%;
  margin-bottom:6px;
  background:#0f1117;
  border:1px solid #2e3250;
  color:#aaa;
  padding:6px;
  border-radius:6px;
  cursor:pointer;
}
.suggestions button:hover {
  border-color:#2563eb;
  color:white;
}

/* INPUT */
.chat-input {
  display:flex;
  padding:12px;
  border-top:1px solid #2e3250;
}
input {
  flex:1;
  padding:10px;
  background:#0f1117;
  border:1px solid #2e3250;
  color:white;
  border-radius:6px;
}
button.send {
  margin-left:8px;
  padding:10px 14px;
  background:#2563eb;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>Olist E-Commerce BI Platform</h1>
  <span>AI Powered</span>
</header>

<div class="kpis">
  <div class="kpi"><label >Total Orders</label><span id="orders"></span></div>
  <div class="kpi"><label >Total Revenue</label><span id="revenue"></span></div>
  <div class="kpi"><label >Avg Order Value</label><span id="aov"></span></div>
  <div class="kpi"><label >Churn Rate</label><span id="churn"></span></div>
  <div class="kpi"><label >Avg Review</label><span id="review"></span></div>
</div>

<div class="main">

  <!-- CHARTS -->
  <div class="charts">
    <div class="card wide"><h3>Monthly Revenue Trend</h3><div id="rev" style="height:260px"></div></div>
    <div class="card"><h3>Top Product Categories</h3><div id="cat" style="height:280px"></div></div>
    <div class="card"><h3>Churn Rate by State</h3><div id="churnChart" style="height:280px"></div></div>
    <div class="card"><h3>Review Score Distribution</h3><div id="reviews" style="height:280px"></div></div>
    <div class="card"><h3>Delivery Performance</h3><div id="delivery" style="height:280px"></div></div>
  </div>

  <!-- CHAT -->
  <div class="chat">

    <div class="chat-header">
      <strong>Ask the Data</strong>
      <button onclick="resetChat()">Clear</button>
    </div>

    <div class="chat-box" id="chat">
      <div class="msg bot">Ask me anything about the data.</div>
    </div>

    <div class="suggestions">
      <button onclick="askQ('What is driving the highest revenue?')">What is driving the highest revenue?</button>
      <button onclick="askQ('Which states have the worst churn rates?')">Worst churn states</button>
      <button onclick="askQ('How does delivery affect reviews?')">Delivery vs reviews</button>
    </div>

    <div class="chat-input">
      <input id="q" placeholder="Ask..." onkeydown="if(event.key==='Enter') send()" />
      <button class="send" onclick="send()">Send</button>
    </div>

  </div>

</div>

<script>
const stats  = {{ stats  | tojson }};
const charts = {{ charts | tojson }};

// Debug: log raw data so we can see exactly what arrived
console.log("=== CHARTS DATA ===", JSON.stringify(charts, null, 2));
console.log("top_categories sample:", charts.top_categories && charts.top_categories[0]);
console.log("churn_by_state sample:", charts.churn_by_state  && charts.churn_by_state[0]);

/* ================= KPI ================= */
document.getElementById("orders").innerText  = stats.total_orders.toLocaleString();
document.getElementById("revenue").innerText = "R$ " + (stats.total_revenue / 1e6).toFixed(1) + "M";
document.getElementById("aov").innerText     = "R$ " + stats.avg_order_value.toFixed(2);
document.getElementById("churn").innerText   = stats.churn_rate_pct.toFixed(2) + "%";
document.getElementById("review").innerText  = stats.avg_review_score.toFixed(1);

/* ================= HELPERS ================= */
function safe(val) {
  return Array.isArray(val) && val.length > 0 ? val : null;
}

/* ================= DARK THEME ================= */
const BASE = {
  paper_bgcolor: "rgba(0,0,0,0)",
  plot_bgcolor:  "rgba(0,0,0,0)",
  font:   { color: "#9aa0bb" },
  xaxis:  { gridcolor: "#2e3250", zeroline: false },
  yaxis:  { gridcolor: "#2e3250", zeroline: false },
  autosize: true
};
const CFG = { displayModeBar: false, responsive: true };

/* ================= REVENUE ================= */
const rev = safe(charts.revenue_by_month);
if (rev) {
  Plotly.newPlot("rev", [{
    x:    rev.map(d => d.period),
    y:    rev.map(d => d.revenue),
    type: "scatter", mode: "lines+markers",
    line: { color: "#2563eb" }
  }], { ...BASE, margin: { t:20, b:40, l:60, r:10 } }, CFG);
} else {
  document.getElementById("rev").innerText = "No data";
}

/* ================= CATEGORIES ================= */
const catsRaw = safe(charts.top_categories);

if (catsRaw) {

  const cats = Array.isArray(catsRaw) ? catsRaw : [catsRaw];

  
  const xVals = cats.map(d => d.category).slice().reverse();
  const yVals = cats.map(d => d.revenue).slice().reverse();

  Plotly.newPlot("cat", [{
  x: xVals,
  y: yVals,
  type: "bar",
  orientation: "v",
  marker: { color: "#2563eb" }
}], {
  paper_bgcolor: "#1a1d27",   
  plot_bgcolor:  "#1a1d27",   
  font: { color: "#e0e0e0" }, 
  ...BASE,
  
  xaxis: { gridcolor: "#2e3250" },
  yaxis: { title: "Revenue", gridcolor: "#2e3250" },

  margin: { t:10, b:70, l:70, r:70 }
}, {
  displayModeBar: false,
  responsive: true
});

}

/* ================= CHURN ================= */
const churnRaw = safe(charts.churn_by_state);

if (churnRaw) {

  console.log("CHURN RAW:", churnRaw);

  const churn = Array.isArray(churnRaw) ? churnRaw : [churnRaw];

  const xVals = churn.map(d => d.state);
  const yVals = churn.map(d => Number(d.churn_rate));

  console.log("X:", xVals);
  console.log("Y:", yVals);

  Plotly.newPlot("churnChart", [{
    x: xVals,
    y: yVals,
    type: "bar",
    marker: { color: "#2563eb" }
  }],{
  paper_bgcolor: "#1a1d27",   
  plot_bgcolor:  "#1a1d27",   
  font: { color: "#e0e0e0" }, 
  ...BASE,
  xaxis: { title: "State" ,gridcolor: "#2e3250" },
  yaxis: { title: "Churn Rate" ,gridcolor: "#2e3250" },

  margin: { t:10, b:70, l:70, r:70 }
}, {
  displayModeBar: false,
  responsive: true
});

} else {
  document.getElementById("churnChart").innerText = "No data";
}
/* ================= REVIEWS ================= */
const reviews = safe(charts.review_score_distribution);

Plotly.newPlot("reviews", [{
  x: reviews.map(d => String(d.score)),
  y: reviews.map(d => d.count),
  type: "bar",
  marker: { 
    color: "#2563eb"
    
  }
}], {
  
  paper_bgcolor: "#1a1d27",   
  plot_bgcolor:  "#1a1d27",   
  font: { color: "#e0e0e0" }, 

  ...BASE,
 margin: { t:10, b:70, l:70, r:70 },
  xaxis: { title: "Review Score" ,gridcolor: "#2e3250"},
  yaxis: { title: "Number of Reviews", gridcolor: "#2e3250" }
}, CFG);
/* ================= DELIVERY ================= */
const delivery = safe(charts.delivery_performance);
if (delivery) {
  Plotly.newPlot("delivery", [{
    labels: delivery.map(d => d.status),
    values: delivery.map(d => d.count),
    type:   "pie", hole: 0.5,
    marker: { colors: ["#22c55e", "#ef4444"] }
  }], { ...BASE, margin: { t:20, b:20, l:10, r:10 } }, CFG);
} else {
  document.getElementById("delivery").innerText = "No data";
}


/* ================= CHAT ================= */
async function send(){
  const input = document.getElementById("q");
  const q = input.value.trim();
  if(!q) return;
  input.value="";
  askQ(q);
}

async function askQ(q){
  const box = document.getElementById("chat");
  box.innerHTML += `<div class="msg user">${q}</div>`;

  const res = await fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({question:q})
  });

  const data = await res.json();

  box.innerHTML += `<div class="msg bot">${data.answer || data.error}</div>`;
  box.scrollTop = box.scrollHeight;
}

/* ================= RESET ================= */
async function resetChat(){
  await fetch("/reset",{method:"POST"});
  document.getElementById("chat").innerHTML =
    `<div class="msg bot">Chat reset. Ask me anything about the data.</div>`;
}
charts.churn_by_state[0]
</script>

</body>
</html>
